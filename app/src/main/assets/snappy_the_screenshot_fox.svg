<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
        <defs>
            <!-- Clip path to easily color the tail tip black -->
            <clipPath id="tailClip">
                <path d="M 260 360 C 350 400, 450 350, 420 250 C 400 150, 320 160, 320 220 C 320 280, 280 340, 260 340 Z"/>
            </clipPath>
            
            <!-- Clip paths for the black ear tips -->
            <clipPath id="leftEarClip">
                <path d="M 150 120 C 130 60, 140 40, 160 40 C 180 40, 200 80, 210 110 Z"/>
            </clipPath>
            <clipPath id="rightEarClip">
                <path d="M 350 120 C 370 60, 360 40, 340 40 C 320 40, 300 80, 290 110 Z"/>
            </clipPath>
        </defs>

        <!-- Drop Shadows -->
        <ellipse cx="250" cy="395" rx="80" ry="12" fill="#E2E8F0"/>
        <ellipse cx="350" cy="395" rx="60" ry="10" fill="#E2E8F0"/>

        <!-- =================== BACK LAYER (TAIL) =================== -->
        <!-- Fluffy Orange Tail -->
        <path d="M 260 360 C 350 400, 450 350, 420 250 C 400 150, 320 160, 320 220 C 320 280, 280 340, 260 340 Z" fill="#FF6B00"/>
        <!-- Black Tail Tip -->
        <circle cx="410" cy="180" r="50" fill="#1C1C1E" clip-path="url(#tailClip)"/>

        <!-- =================== MIDDLE LAYER (BODY & COAT) =================== -->
        <!-- Legs (Orange) -->
        <rect x="200" y="350" width="24" height="45" rx="12" fill="#FF6B00"/>
        <rect x="276" y="350" width="24" height="45" rx="12" fill="#FF6B00"/>
        <!-- Black Socks -->
        <rect x="200" y="375" width="24" height="20" rx="10" fill="#1C1C1E"/>
        <rect x="276" y="375" width="24" height="20" rx="10" fill="#1C1C1E"/>

        <!-- Body Base -->
        <rect x="190" y="220" width="120" height="150" rx="60" fill="#FF6B00"/>
        
        <!-- PI Trench Coat Base -->
        <path d="M 185 240 C 185 240, 175 350, 195 365 L 305 365 C 325 350, 315 240, 315 240 Z" fill="#D4A373"/>
        
        <!-- White Shirt inside coat -->
        <path d="M 230 240 L 270 240 L 250 290 Z" fill="#FFFFFF"/>
        
        <!-- Red Tie -->
        <path d="M 245 250 L 255 250 L 250 285 Z" fill="#D00000"/>
        <ellipse cx="250" cy="245" rx="5" ry="5" fill="#9D0208"/>

        <!-- Coat Lapels -->
        <path d="M 230 240 L 210 290 L 250 290 Z" fill="#CCD5AE" opacity="0.3"/>
        <path d="M 270 240 L 290 290 L 250 290 Z" fill="#CCD5AE" opacity="0.3"/>
        <path d="M 230 240 L 210 280 L 245 285 Z" fill="#FAEDCD"/>
        <path d="M 270 240 L 290 280 L 255 285 Z" fill="#FAEDCD"/>
        
        <!-- Coat Belt -->
        <rect x="188" y="330" width="124" height="15" rx="5" fill="#D4A373"/>
        <rect x="235" y="327" width="30" height="21" rx="3" fill="none" stroke="#FEFAE0" stroke-width="4"/>

        <!-- =================== HEAD LAYER =================== -->
        <!-- Left Ear -->
        <path d="M 150 120 C 130 60, 140 40, 160 40 C 180 40, 200 80, 210 110 Z" fill="#FF6B00"/>
        <circle cx="160" cy="50" r="30" fill="#1C1C1E" clip-path="url(#leftEarClip)"/>

        <!-- Right Ear -->
        <path d="M 350 120 C 370 60, 360 40, 340 40 C 320 40, 300 80, 290 110 Z" fill="#FF6B00"/>
        <circle cx="340" cy="50" r="30" fill="#1C1C1E" clip-path="url(#rightEarClip)"/>

        <!-- Head Base (Wide Chibi Head) -->
        <rect x="140" y="100" width="220" height="160" rx="80" fill="#FF6B00"/>

        <!-- White Fox Mask (Heart shape) -->
        <path d="M 140 190 C 140 260, 210 270, 250 230 C 290 270, 360 260, 360 190 C 360 140, 290 160, 250 190 C 210 160, 140 140, 140 190 Z" fill="#FFFFFF"/>

        <!-- Facial Details -->
        <!-- Blush -->
        <ellipse cx="180" cy="210" rx="15" ry="8" fill="#FFB3B3" opacity="0.5"/>
        <ellipse cx="320" cy="210" rx="15" ry="8" fill="#FFB3B3" opacity="0.5"/>
        
        <!-- Mischievous Eyebrows -->
        <path d="M 190 155 Q 205 145 220 155" fill="none" stroke="#D95A00" stroke-width="4" stroke-linecap="round"/>
        <path d="M 280 150 Q 295 140 310 145" fill="none" stroke="#D95A00" stroke-width="4" stroke-linecap="round"/>

        <!-- Clever Eyes -->
        <path d="M 190 180 Q 205 165 220 180" fill="none" stroke="#1C1C1E" stroke-width="7" stroke-linecap="round"/>
        <path d="M 280 180 Q 295 165 310 180" fill="none" stroke="#1C1C1E" stroke-width="7" stroke-linecap="round"/>

        <!-- Nose -->
        <ellipse cx="250" cy="210" rx="14" ry="9" fill="#1C1C1E"/>
        <ellipse cx="246" cy="207" rx="4" ry="2" fill="#FFFFFF" transform="rotate(-15 246 207)"/>

        <!-- Smirk -->
        <path d="M 235 222 Q 250 230 265 218" fill="none" stroke="#1C1C1E" stroke-width="5" stroke-linecap="round"/>

        <!-- PI Fedora -->
        <!-- Hat Brim -->
        <path d="M 120 115 Q 250 80 380 115 C 390 120, 390 130, 380 130 Q 250 100 120 130 C 110 130, 110 120, 120 115 Z" fill="#CC9359"/>
        <!-- Hat Crown -->
        <path d="M 170 105 C 170 40, 200 20, 250 20 C 300 20, 330 40, 330 105 Z" fill="#D4A373"/>
        <!-- Hat Ribbon -->
        <path d="M 170 90 Q 250 75 330 90 L 330 105 Q 250 90 170 105 Z" fill="#1C1C1E"/>
        <!-- Hat Indent -->
        <ellipse cx="250" cy="35" rx="30" ry="10" fill="#BC814B"/>

        <!-- =================== FRONT LAYER (ARMS & PHONE) =================== -->
        <!-- Arms (Connecting behind phone) - Now with Coat Sleeves -->
        <!-- Left Arm Sleeve -->
        <path d="M 185 250 Q 160 280 200 310" fill="none" stroke="#D4A373" stroke-width="24" stroke-linecap="round"/>
        <!-- Right Arm Sleeve -->
        <path d="M 315 250 Q 340 270 285 285" fill="none" stroke="#D4A373" stroke-width="24" stroke-linecap="round"/>

        <!-- Black Phone -->
        <rect x="215" y="240" width="70" height="110" rx="12" fill="#1C1C1E"/>
        <!-- Phone Screen -->
        <rect x="222" y="247" width="56" height="96" rx="6" fill="#F8FAFC"/>
        
        <!-- Screen Content (Screenshot lines & Mag Glass) -->
        <rect x="235" y="260" width="30" height="4" rx="2" fill="#CBD5E1"/>
        <rect x="235" y="315" width="30" height="4" rx="2" fill="#CBD5E1"/>
        <rect x="235" y="325" width="15" height="4" rx="2" fill="#CBD5E1"/>
        
        <!-- Magnifying Glass on Screen -->
        <circle cx="250" cy="285" r="14" fill="#E8F0FE" stroke="#3B82F6" stroke-width="4"/>
        <line x1="260" y1="295" x2="272" y2="307" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
        <!-- Green Check (Finding the info!) -->
        <path d="M 243 285 L 248 290 L 257 280" fill="none" stroke="#10B981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Notification Badge -->
        <circle cx="295" cy="235" r="16" fill="#FF3300"/>
        <circle cx="295" cy="235" r="16" fill="none" stroke="#FFFFFF" stroke-width="3"/>
        <text x="295" y="241" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="900" font-size="16" text-anchor="middle">1</text>

        <!-- White Gloves -->
        <!-- Left Glove (Holding Phone) -->
        <circle cx="215" cy="305" r="20" fill="#FFFFFF"/>
        <path d="M 195 305 A 20 20 0 0 0 235 305" fill="#F1F5F9"/> <!-- Glove Shadow -->
        <line x1="205" y1="300" x2="205" y2="315" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
        <line x1="215" y1="300" x2="215" y2="318" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>

        <!-- Right Glove (Tapping Screen) -->
        <circle cx="280" cy="280" r="18" fill="#FFFFFF"/>
        <path d="M 262 280 A 18 18 0 0 0 298 280" fill="#F1F5F9"/> <!-- Glove Shadow -->
        <line x1="275" y1="275" x2="275" y2="290" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
        <line x1="285" y1="275" x2="285" y2="292" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>

    </svg>
